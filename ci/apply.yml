name: Intialise Terraform Code and Apply

#Workflow Triggers
on:
  push:
    branches:
      - master
      
##Environment Variables
env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_CREDENTIALS: ${{ secrets.AWS_ROLE_ARN }}
  
#Define Jobs
jobs:
  terraform:
    name: "Deploy Infrastructure to Cloud"
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: write
      security-events: write

    steps:

    - name: Configure AWS credentials (OIDC)
      uses: aws-actions/configure-aws-credentials@v4
      with:
         role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
         aws-region: ${{ vars.AWS_REGION }}


    - name: Checkout repository
      uses: actions/checkout@v4


    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.13.3

    
    - name: Terraform init
      working-directory: ./terraform
      run: terraform init 

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig --region eu-west-2 --name eks-cluster

    - name: Install kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: v1.30.0

    - name: Patch aws-auth configmap
      run: |
       kubectl patch configmap aws-auth -n kube-system --type='merge' -p '{
         "data": {
           "mapUsers": "- userarn: arn:aws:iam::038774803581:user/terraform-test\n  username: terraform-test\n  groups:\n    - system:masters"
        }
        }'

    - name: Terraform Apply
      working-directory: ./terraform
      run: terraform apply --auto-approve





    

    

    