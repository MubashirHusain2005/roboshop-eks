apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-canary
  namespace: {{ .Values.namespaces.app }}
spec:
  replicas: {{ .Values.web.replicas }}
  selector:
    matchLabels:
      app: web
      version: {{ .Values.web.canaryVersion }}
  template:
    metadata:
      labels:
        app: web
        version: {{ .Values.web.canaryVersion }}
    spec:
      containers:
      - name: robot-app-web-canary
        image: {{ .Values.global.registry }}/web-canary:{{ .Values.web.canaryVersion }} 
        imagePullPolicy: {{ .Values.global.imagePullPolicy }}
        ports:
        - containerPort: {{ .Values.web.port }}
        env:
        - name: SESSION_SECURE
          value: {{ .Values.web.sessionSecure | quote }}
        - name: SESSION_SAMESITE
          value: {{ .Values.web.sessionSamesite }}
        - name: INSTANA_DISABLE_AUTO_INSTR
          value: "true"
        resources:
          requests:
            cpu: {{ .Values.web.resources.requests.cpu }}
            memory: {{ .Values.web.resources.requests.memory }}
          limits:
            cpu: {{ .Values.web.resources.limits.cpu }}
            memory: {{ .Values.web.resources.limits.memory }}