apiVersion: v1
kind: ResourceQuota
metadata:
  name: app-quota
  namespace: {{ .Values.namespaces.app }}
spec:
  hard:
    requests.cpu: {{ .Values.quotas.app.requests.cpu }}
    requests.memory: {{ .Values.quotas.app.requests.memory }}
    limits.cpu: {{ .Values.quotas.app.limits.cpu }}
    limits.memory: {{ .Values.quotas.app.limits.memory }}
    pods: {{ .Values.quotas.app.pods | quote }}
    
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: data-quota
  namespace: {{ .Values.namespaces.data }}
spec:
  hard:
    requests.cpu: {{ .Values.quotas.data.requests.cpu }}
    requests.memory: {{ .Values.quotas.data.requests.memory }}
    limits.cpu: {{ .Values.quotas.data.limits.cpu }}
    limits.memory: {{ .Values.quotas.data.limits.memory }}
    pods: {{ .Values.quotas.data.pods | quote }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: {{ .Values.namespaces.data }}
data:
  redis.conf: |
    appendonly {{ .Values.redis.config.appendonly }}
    appendfsync {{ .Values.redis.config.appendfsync }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo
  namespace: {{ .Values.namespaces.data }}
spec:
  serviceName: mongo
  replicas: {{ .Values.mongo.replicas }}
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: {{ .Values.global.nodeAffinityKey }}
                    operator: In
                    values:
                      - {{ .Values.global.nodeAffinityValue }}
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: mongo
              topologyKey: kubernetes.io/hostname
      containers:
      - name: mongo
        image: {{ .Values.global.registry }}/mongo:{{ .Values.global.imageTag }}
        ports:
        - containerPort: {{ .Values.mongo.port }}
        volumeMounts:
        - name: mongo-data
          mountPath: /data/db
        resources:
          requests:
            cpu: {{ .Values.mongo.resources.requests.cpu }}
            memory: {{ .Values.mongo.resources.requests.memory }}
          limits:
            cpu: {{ .Values.mongo.resources.limits.cpu }}
            memory: {{ .Values.mongo.resources.limits.memory }}
  volumeClaimTemplates:
  - metadata:
      name: mongo-data
    spec:
      accessModes:
      - ReadWriteOnce
      storageClassName: {{ .Values.mongo.storageClass }}
      resources:
        requests:
          storage: {{ .Values.mongo.storage }}
---
##MYSQL
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: app-space
spec:
  serviceName: mysql
  replicas: 2
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      #serviceAccountName: mysql-sa    
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: workload
                operator: In
                values:
                - app
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app: mysql
            topologyKey: kubernetes.io/hostname
      containers:
      - name: mysql
        image: 038774803581.dkr.ecr.eu-west-2.amazonaws.com/mysql:v1
        ports:
        - containerPort: 3306
          name: mysql
        env:
        - name: MYSQL_DATABASE
          value: cities
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: root-password
        - name: MYSQL_USER
          value: shipping
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secret
              key: user-password
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        volumeMounts:
        - name: mysql-data
          mountPath: /var/lib/mysql
          subPath: mysql
        readinessProbe:                
          exec:
            command:
            - sh
            - -c
            - |
              mysqladmin ping \
                -h 127.0.0.1 \
                -u root \
                -p"$MYSQL_ROOT_PASSWORD" \
                --silent
          initialDelaySeconds: 120
          periodSeconds: 10
  volumeClaimTemplates:
  - metadata:
      name: mysql-data
    spec:
      accessModes:
      - ReadWriteOnce
      storageClassName: mysql-gp3
      resources:
        requests:
          storage: 5Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: data-space
spec:
  serviceName: "redis"
  replicas: 2
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      affinity:
         nodeAffinity:
           requiredDuringSchedulingIgnoredDuringExecution:
             nodeSelectorTerms:
               - matchExpressions:
                   - key: workload
                     operator: In
                     values:
                       - app
         podAntiAffinity:
           requiredDuringSchedulingIgnoredDuringExecution:
             - labelSelector:
                 matchLabels:
                   app: redis
               topologyKey: kubernetes.io/hostname
      containers:
      - name: redis
        image: redis:6.2
        ports:
        - containerPort: 6379
        resources:
          requests:
            cpu: "100m"
            memory: "190Mi"
          limits:
            cpu: "300m"
            memory: "256Mi"
        volumeMounts:
       
        - name: redis-config
          mountPath: /usr/local/etc/redis/redis.conf
          subPath: redis.conf


        - name: redis-data
          mountPath: /data


        command:
        - sh
        - -c
        - |
          redis-server /usr/local/etc/redis/redis.conf \
          --appendonly yes


      volumes:
      - name: redis-config
        configMap:
          name: redis-config


  volumeClaimTemplates:
  - metadata:
      name: redis-data
    spec:
      accessModes:
      - ReadWriteOnce
      storageClassName: redis-gp3
      resources:
        requests:
          storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: data-space
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      affinity:
         nodeAffinity:
           requiredDuringSchedulingIgnoredDuringExecution:
             nodeSelectorTerms:
               - matchExpressions:
                   - key: workload
                     operator: In
                     values:
                       - app
         podAntiAffinity:
           requiredDuringSchedulingIgnoredDuringExecution:
             - labelSelector:
                 matchLabels:
                   app: rabbitmq
               topologyKey: kubernetes.io/hostname
      containers:
      - name: rabbitmq
        image: rabbitmq:3.8-management-alpine
        ports:
        - containerPort: 5672
        env:
          - name: RABBITMQ_DEFAULT_USER
            value: guest
          - name: RABBITMQ_DEFAULT_PASS
            value: guest
          - name: RABBITMQ_ALLOW_GUEST
            value: "true"
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
