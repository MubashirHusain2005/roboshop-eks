name: Intialise Terraform Code and Plan

on:
  push:
    branches:
      - master

##Environment Variables      
env:
  S3_BUCKET: ${{ secrets.S3_BUCKET }}
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_CREDENTIALS: ${{ secrets.AWS_CREDENTIALS }}

permissions:
      id-token: write
      contents: read 


#Define Jobs
jobs:
  terraform:
    runs-on: ubuntu-latest

    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4


    - name: Configure AWS credentials using OIDC
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_CREDENTIALS }}
        aws-region: ${{ vars.AWS_REGION }}

    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: latest

    - name: Initialise Terraform
      working-directory: ./terraform
      run: terraform init -backend-config="bucket=$S3_BUCKET"

    - name: Terraform format
      working-directory: ./terraform
      run: terraform fmt --recursive

    - name: Terraform Validate 
      working-directory: ./terraform
      run: terraform validate

    - name: Run Checkov with reviewdog
      uses: fulgas/reviewdog-action-checkov@v2.3.0
      with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

    - name: Terraform plan
      id: plan 
      run: terraform plan 

    - name: Terraform plan status
      if: steps.plan.outcome == 'failure'
      run: exit 1



  



backend "s3" {
    bucket         = "mhusains3"
    key            = "eks/terraform.tfstate"
    region         = "eu-west-2"
    dynamodb_table = "terraform-lock"
    encrypt        = true
  }



  argocdpass: MyStrongPassword123



#!/bin/bash
# delete-helm-releases.sh
# Description: Delete all Helm releases in all namespaces

set -e

echo "Listing all Helm releases in all namespaces..."
RELEASES=$(helm list -A -q)

if [ -z "$RELEASES" ]; then
  echo "No Helm releases found. Nothing to delete."
  exit 0
fi

echo "Found releases:"
echo "$RELEASES"

for release in $RELEASES; do
  # Get namespace for the release
  NAMESPACE=$(helm list -A | grep "^$release" | awk '{print $2}')
  echo "Deleting release: $release in namespace: $NAMESPACE"
  helm uninstall "$release" -n "$NAMESPACE"
done

echo "All Helm releases deleted."