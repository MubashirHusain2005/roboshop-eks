name: Destroy Infrastructure

on:
  push:
    branches:
      - master

env:
  AWS_REGION: eu-west-2
  EKS_CLUSTER_NAME: eks-cluster

jobs:
  terraform-destroy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write          # Required for GitHub OIDC
      contents: read

    steps:
    # 1️⃣ Checkout repository
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2️⃣ Configure AWS credentials using GitHub OIDC
    - name: Configure AWS credentials via OIDC
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}  # GitHub OIDC IAM Role
        aws-region: ${{ env.AWS_REGION }}

    # 3️⃣ Install kubectl
    - name: Install kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: v1.30.0

    # 4️⃣ Update kubeconfig for EKS
    - name: Update kubeconfig for EKS
      run: |
        aws eks update-kubeconfig \
          --region ${{ env.AWS_REGION }} \
          --name eks-cluster \
          --role-arn ${{ secrets.AWS_ROLE_ARN }}

    # 5️⃣ Patch aws-auth ConfigMap (optional if OIDC role already mapped)
    - name: Patch aws-auth ConfigMap
      run: |
        kubectl patch configmap aws-auth -n kube-system --type='merge' -p '{
          "data": {
            "mapRoles": "- rolearn: ${{ secrets.AWS_ROLE_ARN }}\n  username: github-actions\n  groups:\n    - system:masters"
          }
        }' || echo "Patch skipped if already exists"

    # 6️⃣ Set up Terraform
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.13.3

    # 7️⃣ Terraform init
    - name: Terraform Init
      working-directory: ./terraform
      run: terraform init

    # 8️⃣ Destroy Terraform resources
    - name: Terraform Destroy
      working-directory: ./terraform
      run: terraform destroy --auto-approve