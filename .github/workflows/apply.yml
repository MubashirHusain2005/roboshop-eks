name: Intialise Terraform Code and Apply

#Workflow Triggers
on:
  push:
    branches:
      - master
      
##Environment Variables
env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_CREDENTIALS: ${{ secrets.AWS_ROLE_ARN }}
  
#Define Jobs
jobs:
  terraform:
    name: "Deploy Infrastructure to Cloud"
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: write
      security-events: write

    steps:

    - name: Configure AWS credentials (OIDC)
      uses: aws-actions/configure-aws-credentials@v4
      with:
         role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
         aws-region: ${{ vars.AWS_REGION }}


    - name: Checkout repository
      uses: actions/checkout@v4


    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.13.3

    
    - name: Terraform init
      working-directory: ./terraform
      run: terraform init 

    - name: Install kubectl
      run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

    - name: Configure Kubeconfig
      run: |
         aws eks --region eu-west-2 update-kubeconfig --name eks-cluster

         
    - name: Patch aws-auth configmap
      run: |
        kubectl get configmap aws-auth -n kube-system -o yaml > aws-auth.yaml
        # Append your IAM user if not already present
        echo "
        mapUsers:
        - userarn: arn:aws:iam::038774803581:user/terraform-test
          username: terraform-test
          groups:
          - system:masters
        " >> aws-auth.yaml
        kubectl apply -f aws-auth.yaml

    - name: Terraform Apply
      working-directory: ./terraform
      run: terraform apply --auto-approve





    

    

    