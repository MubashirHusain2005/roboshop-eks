apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: {{ .Values.namespaces.data }}
data:
  redis.conf: |
    appendonly {{ .Values.redis.config.appendonly }}
    appendfsync {{ .Values.redis.config.appendfsync }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo
  namespace: {{ .Values.namespaces.data }}
spec:
  serviceName: mongo
  replicas: {{ .Values.mongo.replicas }}
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: {{ .Values.global.nodeAffinityKey }}
                    operator: In
                    values:
                      - {{ .Values.global.nodeAffinityValue }}
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: mongo
              topologyKey: kubernetes.io/hostname
      containers:
      - name: mongo
        image: {{ .Values.global.registry }}/mongo:{{ .Values.global.imageTag }}
        ports:
        - containerPort: {{ .Values.mongo.port }}
        volumeMounts:
        - name: mongo-data
          mountPath: /data/db
        resources:
          requests:
            cpu: {{ .Values.mongo.resources.requests.cpu }}
            memory: {{ .Values.mongo.resources.requests.memory }}
          limits:
            cpu: {{ .Values.mongo.resources.limits.cpu }}
            memory: {{ .Values.mongo.resources.limits.memory }}
  volumeClaimTemplates:
  - metadata:
      name: mongo-data
    spec:
      accessModes:
      - ReadWriteOnce
      storageClassName: {{ .Values.mongo.storageClass }}
      resources:
        requests:
          storage: {{ .Values.mongo.storage }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: {{ .Values.namespaces.app }}
spec:
  serviceName: mysql
  replicas: {{ .Values.mysql.replicas }}
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: {{ .Values.global.nodeAffinityKey }}
                operator: In
                values:
                - {{ .Values.global.nodeAffinityValue }}
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: mysql
                topologyKey: kubernetes.io/hostname
      containers:
      - name: mysql
        image: {{ .Values.global.registry }}/mysql:{{ .Values.global.imageTag }}
        ports:
        - containerPort: {{ .Values.mysql.port }}
          name: mysql
        env:
        - name: MYSQL_DATABASE
          value: {{ .Values.mysql.database }}
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.mysql.secretName }}
              key: {{ .Values.mysql.secretKeys.rootPassword }}
        - name: MYSQL_USER
          value: {{ .Values.mysql.user }}
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.mysql.secretName }}
              key: {{ .Values.mysql.secretKeys.userPassword }}
        resources:
          requests:
            cpu: {{ .Values.mysql.resources.requests.cpu }}
            memory: {{ .Values.mysql.resources.requests.memory }}
          limits:
            cpu: {{ .Values.mysql.resources.limits.cpu }}
            memory: {{ .Values.mysql.resources.limits.memory }}
        volumeMounts:
        - name: mysql-data
          mountPath: /var/lib/mysql
          subPath: mysql
        readinessProbe:
          exec:
            command:
            - sh
            - -c
            - |
              mysqladmin ping \
                -h 127.0.0.1 \
                -u root \
                -p"$MYSQL_ROOT_PASSWORD" \
                --silent
          initialDelaySeconds: {{ .Values.mysql.readinessProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.mysql.readinessProbe.periodSeconds }}
          failureThreshold: {{ .Values.mysql.readinessProbe.failureThreshold }}
        startupProbe:
          exec:
            command:
            - sh
            - -c
            - |
              mysqladmin ping \
               -h 127.0.0.1 \
               -u root \
               -p"$MYSQL_ROOT_PASSWORD" \
               --silent
          initialDelaySeconds: 20
          periodSeconds: 5
          failureThreshold: 3
        livenessProbe:
          exec:
            command:
            - sh
            - -c
            - |
              mysqladmin ping \
                -h 127.0.0.1 \
                -u root \
                -p"$MYSQL_ROOT_PASSWORD" \
                --silent
          initialDelaySeconds: 0
          periodSeconds: 10
          failureThreshold: 3
  volumeClaimTemplates:
  - metadata:
      name: mysql-data
    spec:
      accessModes:
      - ReadWriteOnce
      storageClassName: {{ .Values.mysql.storageClass }}
      resources:
        requests:
          storage: {{ .Values.mysql.storage }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: {{ .Values.namespaces.data }}
spec:
  serviceName: redis
  replicas: {{ .Values.redis.replicas }}
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: {{ .Values.global.nodeAffinityKey }}
                    operator: In
                    values:
                      - {{ .Values.global.nodeAffinityValue }}
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: redis
              topologyKey: kubernetes.io/hostname
      containers:
      - name: redis
        image: {{ .Values.redis.image }}
        ports:
        - containerPort: {{ .Values.redis.port }}
        resources:
          requests:
            cpu: {{ .Values.redis.resources.requests.cpu }}
            memory: {{ .Values.redis.resources.requests.memory }}
          limits:
            cpu: {{ .Values.redis.resources.limits.cpu }}
            memory: {{ .Values.redis.resources.limits.memory }}
        volumeMounts:
        - name: redis-config
          mountPath: /usr/local/etc/redis/redis.conf
          subPath: redis.conf
        - name: redis-data
          mountPath: /data
        command:
        - sh
        - -c
        - |
          redis-server /usr/local/etc/redis/redis.conf \
          --appendonly yes
      volumes:
      - name: redis-config
        configMap:
          name: redis-config
  volumeClaimTemplates:
  - metadata:
      name: redis-data
    spec:
      accessModes:
      - ReadWriteOnce
      storageClassName: {{ .Values.redis.storageClass }}
      resources:
        requests:
          storage: {{ .Values.redis.storage }}
---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: {{ .Values.namespaces.data }}
spec:
  replicas: {{ .Values.rabbitmq.replicas }}
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: {{ .Values.global.nodeAffinityKey }}
                    operator: In
                    values:
                      - {{ .Values.global.nodeAffinityValue }}
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: rabbitmq
                topologyKey: kubernetes.io/hostname
      containers:
      - name: rabbitmq
        image: {{ .Values.rabbitmq.image }}
        ports:
        - containerPort: {{ .Values.rabbitmq.port }}
        env:
          - name: RABBITMQ_DEFAULT_USER
            valueFrom:
              secretKeyRef:
                name: {{ .Values.rabbitmq.secretName }}
                key: RABBITMQ_DEFAULT_USER   
          - name: RABBITMQ_DEFAULT_PASS                   
            valueFrom: 
              secretKeyRef:
                name: {{ .Values.rabbitmq.secretName }}
                key: RABBITMQ_DEFAULT_PASS
          - name: RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS
            value: "-rabbit loopback_users []"
        resources:
          requests:
            cpu: {{ .Values.rabbitmq.resources.requests.cpu }}
            memory: {{ .Values.rabbitmq.resources.requests.memory }}
          limits:
            cpu: {{ .Values.rabbitmq.resources.limits.cpu }}
            memory: {{ .Values.rabbitmq.resources.limits.memory }}
        livenessProbe:
          exec:
            command:
            - rabbitmq-diagonostics
            - ping
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - rabbitmq-diagonostics
            - check_port_connectivity
          initialDelaySeconds: 20
          periodSeconds: 10
---
