apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: {{ .Values.gateway.name }}
  namespace: {{ .Values.namespaces.app }}
  annotations:
    external-dns.alpha.kubernetes.io/hostname: {{ .Values.gateway.externalDnsHostnames | quote }}
spec:
  selector:
    istio: {{ .Values.gateway.selector }}
  servers:
  - port:
      number: 80
      name: http
      protocol: HTTP
    hosts:
      {{- toYaml .Values.gateway.httpHosts | nindent 6 }}
  - port:
      number: 443
      name: https
      protocol: HTTPS
    tls:
      mode: SIMPLE
      credentialName: {{ .Values.certificate.secretName }}
    hosts:
      {{- toYaml .Values.gateway.httpsHosts | nindent 6 }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.certificate.name }}
  namespace: {{ .Values.namespaces.istio }}
spec:
  secretName: {{ .Values.certificate.secretName }}
  issuerRef:
    name: {{ .Values.certificate.issuer }}
    kind: ClusterIssuer
  dnsNames:
    {{- toYaml .Values.certificate.dnsNames | nindent 4 }}
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: web
  namespace: {{ .Values.namespaces.app }}
spec:
  hosts:
  - {{ .Values.dns.root }}
  gateways:
  - {{ .Values.namespaces.app }}/{{ .Values.gateway.name }}
  http:
  - match:
    - uri:
        prefix: /api/catalogue/
    rewrite:
      uri: /
    route:
    - destination:
        host: catalogue
        port:
          number: {{ .Values.catalogue.port }}
  - match:
    - uri:
        exact: /api/catalogue
    rewrite:
      uri: /
    route:
    - destination:
        host: catalogue
        port:
          number: {{ .Values.catalogue.port }}
  - match:
    - uri:
        prefix: /api/user/
    rewrite:
      uri: /
    route:
    - destination:
        host: user
        port:
          number: {{ .Values.user.port }}
  - match:
    - uri:
        exact: /api/user
    rewrite:
      uri: /
    route:
    - destination:
        host: user
        port:
          number: {{ .Values.user.port }}
  - match:
    - uri:
        prefix: /api/cart/
    rewrite:
      uri: /
    route:
    - destination:
        host: cart
        port:
          number: {{ .Values.cart.port }}
  - match:
    - uri:
        exact: /api/cart
    rewrite:
      uri: /
    route:
    - destination:
        host: cart
        port:
          number: {{ .Values.cart.port }}
  - match:
    - uri:
        prefix: /api/shipping/
    rewrite:
      uri: /
    route:
    - destination:
        host: shipping
        port:
          number: {{ .Values.shipping.port }}
  - match:
    - uri:
        exact: /api/shipping
    rewrite:
      uri: /
    route:
    - destination:
        host: shipping
        port:
          number: {{ .Values.shipping.port }}
  - match:
    - uri:
        prefix: /api/payment/
    rewrite:
      uri: /
    route:
    - destination:
        host: payment
        port:
          number: {{ .Values.payment.port }}
  - match:
    - uri:
        exact: /api/payment
    rewrite:
      uri: /
    route:
    - destination:
        host: payment
        port:
          number: {{ .Values.payment.port }}
  - match:
    - uri:
        prefix: /api/ratings/
    rewrite:
      uri: /
    route:
    - destination:
        host: ratings
        port:
          number: {{ .Values.ratings.port }}
  - match:
    - uri:
        exact: /api/ratings
    rewrite:
      uri: /
    route:
    - destination:
        host: ratings
        port:
          number: {{ .Values.ratings.port }}
  - name: web-split
    route:
    - destination:
        host: web
        port:
          number: {{ .Values.web.port }}
        subset: stable         
      weight: {{ .Values.web.stableWeight }}
    - destination:
        host: web
        port:
          number: {{ .Values.web.port }}
        subset: canary          
      weight: {{ .Values.web.canaryWeight }}

---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: argocd
  namespace: {{ .Values.namespaces.argocd }}
spec:
  hosts:
  - {{ .Values.dns.argocd }}
  gateways:
  - {{ .Values.namespaces.app }}/{{ .Values.gateway.name }}
  http:
  - route:
    - destination:
        host: argocd-server
        port:
          number: {{ .Values.argocd.port }}