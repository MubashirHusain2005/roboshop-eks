apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.shippingdeploymentName }}
  namespace: {{ .Values.appNamespace }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.shippingappName }}
  template:
    metadata:
      labels:
        app: {{ .Values.shippingappName }}
    spec:
      containers:
        - name: {{ .Values.shipping.image.name }}
          image: "{{ .Values.shipping.image.repository }}:{{ .Values.shipping.image.tag }}"
          imagePullPolicy: {{ .Values.shipping.image.pullPolicy }}
          envFrom:
            - secretRef:
                name: kube-secret
          ports:
            - containerPort: 8080
          resources:
             {{- toYaml .Values.shipping.resources | nindent 10 }}

          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 18

          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 6

          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 20
            failureThreshold: 3

---

