apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.webappName }}
  namespace: {{ .Values.appNamespace }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.webappName }}
      version: v1
  template:
    metadata:
      labels:
        app: {{ .Values.webappName }}
        version: v1
    spec:
      containers:
        # ===============================
        # NGINX FRONT PROXY (SIDE CAR)
        # ===============================
        - name: {{ .Values.sidecar-web.image.name }}
          image: {{ .Values.sidecar-web.image.respository }}
          ports:
            - containerPort: 8080
          resources:
            {{- toYaml .Values.sidecar-web.resources | nindent 10 }}
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d


        # ===============================
        # EXISTING WEB CONTAINER
        # ===============================
        - name: {{ .Values.web.image.name }}
          image: "{{ .Values.web.image.repository }}:{{ .Values.web.image.tag }}"
          imagePullPolicy: {{ .Values.user.image.pullPolicy }}
          ports:
            - containerPort: 3000
          env:
            - name: SESSION_SECURE
              value: "false"
            - name: SESSION_SAMESITE
              value: "lax"
            - name: INSTANA_DISABLE_AUTO_INSTR
              value: "true"
          resources:
            {{- toYaml .Values.web.resources | nindent 10 }}

      volumes:
        - name: nginx-config
          configMap:
            name: web-nginx-config
