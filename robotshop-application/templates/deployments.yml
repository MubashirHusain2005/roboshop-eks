############################################
# NAMESPACES
############################################
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.appNamespace }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.databaseNamespace }}
---
############################################
# RESOURCE QUOTAS
############################################
apiVersion: v1
kind: ResourceQuota
metadata:
  name: app-quota
  namespace: {{ .Values.appNamespace }}
spec:
  hard:
    requests.cpu: "4"
    requests.memory: "4Gi"
    limits.cpu: "8"
    limits.memory: "8Gi"
    pods: "30"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: data-quota
  namespace: {{ .Values.databaseNamespace }}
spec:
  hard:
    requests.cpu: "4"
    requests.memory: "8Gi"
    limits.cpu: "8"
    limits.memory: "16Gi"
    pods: "15"
---

############################################
# SECRETS / CONFIGMAPS   
############################################
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: {{ .Values.databaseNamespace }}
  
data:
  redis.conf: |
    appendonly yes
    appendfsync everysec
---
############################################
#  STATEFULSETS / DEPLOYMENTS
############################################
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.mongoappName }}
  namespace: {{ .Values.databaseNamespace }}
spec:
  serviceName: {{ .Values.mongoappName }}
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.mongoappName }}
  template:   
    metadata:
      labels:
        app: {{ .Values.mongoappName }}
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: workload
                operator: In
                values:
                - database
      containers:
      - name: {{ .Values.mongoappName }}
        image: "{{ .Values.mongo.image.repository }}:{{ .Values.mongo.image.tag }}"
        ports:
        - containerPort: 27017
        volumeMounts:
        - name: mongo-data
          mountPath: /data/db
        resources:
          {{- toYaml .Values.mongo.resources | nindent 10 }}
  volumeClaimTemplates:
  - metadata:
      name: mongo-data
    spec:
      accessModes:
      - ReadWriteOnce
      storageClassName: mongo-gp3
      resources:
        requests:
          storage: 5Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name:  {{ .Values.mysqlappName }}
  namespace: {{ .Values.appNamespace }} 
spec:
  serviceName: {{ .Values.mysqlappName }}
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app:  {{ .Values.mysqlappName }}
  template:
    metadata:
      labels:
        app:  {{ .Values.mysqlappName }}
    spec:
      containers:
        - name: {{ .Values.mysqlappName }}
          image: "{{ .Values.mysql.image.repository }}:{{ .Values.mysql.image.tag }}"
          ports:
            - containerPort: 3306
              name:  {{ .Values.mysqlappName }}
          env:
            - name: MYSQL_DATABASE
              value: cities
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: root-password
            - name: MYSQL_USER
              value: shipping
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: user-password
          resources:
           {{- toYaml .Values.mysql.resources | nindent 10 }}
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
              subPath: mysql
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - |
                  mysqladmin ping \
                    -h 127.0.0.1 \
                    -u root \
                    -p"$MYSQL_ROOT_PASSWORD" \
                    --silent
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 60
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: mysql-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: mysql-gp3
        resources:
          requests:
            storage: 5Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.redisappName }}
  namespace: {{ .Values.databaseNamespace }}
spec:
  serviceName: {{ .Values.redisappName }}
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.redisappName }}
  template:
    metadata:
      labels:
        app: {{ .Values.redisappName }}
    spec:
      containers:
      - name: {{ .Values.redisappName }}
        image: "{{ .Values.redis.image }}"
        ports:
        - containerPort: 6379

        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: redis-secret
              key: REDIS_PASSWORD

        volumeMounts:
        # Redis config from ConfigMap
        - name: redis-config
          mountPath: /usr/local/etc/redis/redis.conf
          subPath: redis.conf

        # Persistent data volume
        - name: redis-data
          mountPath: /data

        command:
        - sh
        - -c
        - |
          redis-server /usr/local/etc/redis/redis.conf \
          --requirepass "$REDIS_PASSWORD" \
          --appendonly yes
##Secret created by terraform
      volumes:
      - name: redis-config
        configMap:
          name: redis-config

  volumeClaimTemplates:
  - metadata:
      name: redis-data
    spec:
      accessModes:
      - ReadWriteOnce
      storageClassName: redis-gp3
      resources:
        requests:
          storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.rabbitmqappName }}
  namespace: {{ .Values.databaseNamespace }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.rabbitmqappName }}
  template:
    metadata:
      labels:
        app: {{ .Values.rabbitmqappName }}
    spec:
      containers:
      - name: {{ .Values.rabbitmqappName }}
        image: "{{ .Values.rabbitmq.image }}"
        ports:
        - containerPort: 5672
        env:
          - name: RABBITMQ_DEFAULT_USER
            value: guest
          - name: RABBITMQ_DEFAULT_PASS
            value: guest
          - name: RABBITMQ_ALLOW_GUEST
            value: "true"
        resources:
          {{- toYaml .Values.rabbitmq.resources | nindent 10 }}
---
# APP-SPACE DEPLOYMENTS 
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.deploymentName }}
  namespace: {{ .Values.appNamespace }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.cartappName }}
  template:
    metadata:
      labels:
        app: {{ .Values.cartappName }}
    spec:
      containers:
      - name: {{ .Values.cartappName }}
        image: "{{ .Values.cart.image.repository }}:{{ .Values.cart.image.tag }}"
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: REDIS_HOST
          value: redis.data-space.svc.cluster.local
        - name: REDIS_PORT
          value: "6379"
        - name: CATALOGUE_HOST
          value: catalogue.app-space.svc.cluster.local
        - name: INSTANA_DISABLE_AUTP_INSTR
          value: "true"
        resources:
          {{- toYaml .Values.cart.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
---
