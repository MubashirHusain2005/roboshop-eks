# ECR

global:
  registry: 038774803581.dkr.ecr.eu-west-2.amazonaws.com
  imageTag: v1
  imagePullPolicy: Always
  nodeAffinityKey: workload
  nodeAffinityValue: app


# NAMESPACES

namespaces:
  app: app-space
  data: data-space
  istio: istio-system
  argocd: argo-cd


# RESOURCE QUOTAS

quotas:
  app:
    requests:
      cpu: "16"
      memory: "16Gi"
    limits:
      cpu: "32"
      memory: "32Gi"
    pods: "40"
  data:
    requests:
      cpu: "4"
      memory: "8Gi"
    limits:
      cpu: "8"
      memory: "16Gi"
    pods: "20"


# REDIS

redis:
  replicas: 2
  image: redis:6.2
  port: 6379
  storageClass: redis-gp3
  storage: 10Gi
  resources:
    requests:
      cpu: "100m"
      memory: "190Mi"
    limits:
      cpu: "300m"
      memory: "256Mi"
  config:
    appendonly: "yes"
    appendfsync: "everysec"


# MONGO

mongo:
  replicas: 2
  port: 27017
  storageClass: mongo-gp3
  storage: 5Gi
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"


# MYSQL

mysql:
  replicas: 1
  imageTag: v9
  port: 3306
  database: cities
  user: shipping
  storageClass: mysql-gp3
  storage: 5Gi
  secretName: mysql-secret
  secretKeys:
    rootPassword: root-password
    userPassword: user-password
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  readinessProbe:
    initialDelaySeconds: 60
    periodSeconds: 10
    failureThreshold: 20  


# RABBITMQ

rabbitmq:
  replicas: 2
  port: 5672
  secretName: rabbitmq-secret
  secretKeys: 
    RABBITMQ_DEFAULT_PASS: RABBITMQ_DEFAULT_PASS
    RABBITMQ_DEFAULT_USER: RABBITMQ_DEFAULT_USER
  image: rabbitmq:3.8-management-alpine
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"


# APP: CART

cart:
  replicas: 1
  port: 8080
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"
  probes:
    path: /health
    initialDelaySeconds: 30
    periodSeconds: 10


#CATALOGUE

catalogue:
  replicas: 1
  port: 8080
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"
  probes:
    path: /health
    initialDelaySeconds: 30
    periodSeconds: 10


# DISPATCH

dispatch:
  replicas: 1
  port: 80
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

# SHIPPING

shipping:
  replicas: 1
  port: 8080
  secretName: shipping-secret
  secretKeys:
    DB_USER: DB_USER
    DB_PASSWORD: DB_PASSWORD
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"
  probes:
    path: /health
    startup:
      initialDelaySeconds: 60
      periodSeconds: 10
      failureThreshold: 18
    readiness:
      initialDelaySeconds: 60
      periodSeconds: 10
      failureThreshold: 6
    liveness:
      initialDelaySeconds: 120
      periodSeconds: 20
      failureThreshold: 3


#  PAYMENT

payment:
  replicas: 1
  secretName: payment-rabbitmq-secret
  port: 8080
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"
  probes:
    path: /health
    initialDelaySeconds: 30
    periodSeconds: 10


#  RATINGS

ratings:
  replicas: 1
  port: 80
  mysqlHost: mysql.app-space.svc.cluster.local
  mysqlPort: 3306
  secretName: mysql-secret
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"


#  USER

user:
  replicas: 1
  port: 8080
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"


#  WEB

web:
  replicas: 1
  port: 3000
  stableVersion: v1
  canaryVersion: v2
  sessionSecure: "false"
  stableWeight: 80
  canaryWeight: 20
  sessionSamesite: "lax"
  resources:
    requests:
      cpu: "100m"
      memory: "60Mi"
    limits:
      cpu: "200m"
      memory: "100Mi"



# STORAGE CLASSES 

storage:
  provisioner: ebs.csi.aws.com
  volumeBindingMode: WaitForFirstConsumer
  parameters:
    type: gp3
    encrypted: "true"


# DNS

dns:
  root: mubashir.site
  argocd: argocd.mubashir.site



# GATEWAY

gateway:
  name: web-gateway
  selector: ingress
  externalDnsHostnames: "mubashir.site, argocd.mubashir.site"
  httpHosts:
    - "app-space/mubashir.site"
    - "argo-cd/argocd.mubashir.site"
  httpsHosts:
    - "argo-cd/argocd.mubashir.site"
    - "app-space/mubashir.site"


# CERTIFICATE

certificate:
  name: mubashir-site-cert
  secretName: mubashir-tls
  issuer: letsencrypt-prod   ##can be staging too
  dnsNames:
    - mubashir.site
    - argocd.mubashir.site


# ARGOCD

argocd:
  port: 80


# MTLS

mtls:
  mode: STRICT


# DESTINATION RULE

destinationRule:
  loadBalancer: ROUND_ROBIN
  outlierDetection:
    consecutive5xxErrors: 3
    interval: 30s
    baseEjectionTime: 30s