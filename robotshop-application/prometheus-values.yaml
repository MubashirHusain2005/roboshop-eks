alertmanager:
  config:
    global:
      resolve_timeout: 5m

    route:
      receiver: "email-alert"
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - match:
            severity: critical
          receiver: "email-alert"

    receivers:
      - name: "email-alert"
        email_configs:
          - to: "stokemubashir@gmail.com"
            from: "alerts@example.com"
            smarthost: "smtp.gmail.com:587"
            auth_username: "stokemubashir@gmail.com"
            auth_password: xiwkoekzbcbxqwtn
            require_tls: true