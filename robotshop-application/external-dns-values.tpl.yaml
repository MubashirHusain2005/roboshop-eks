provider: aws
aws:
  region: eu-west-2

policy: sync

registry: txt

txtOwnerId: mubashir-cluster

sources:
  - service
  - istio-gateway
  - istio-virtualservice

domainFilters:
  - mubashir.site


serviceAccount:
  create: false
  name: external-dns
  annotations:
    eks.amazonaws.com/role-arn: "${role_arn}"


resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi


#livenessProbe:
  #httpGet:
    #path: /healthz
    #port: 8081
  #initialDelaySeconds: 10
  #periodSeconds: 10

#readinessProbe:
  #httpGet:
    #path: /readyz
    #port: 8081
  #initialDelaySeconds: 10
  #periodSeconds: 10

rbac:
  create: false