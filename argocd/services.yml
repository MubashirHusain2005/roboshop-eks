############################################
# DATA-SPACE SERVICES (separate)
############################################
apiVersion: v1
kind: Service
metadata:
  name: mongo
  namespace: data-space
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  type: ClusterIP
  selector:
    app: mongo
  ports:
  - port: 27017
    targetPort: 27017

---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: app-space    
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  selector:
    app: mysql
  ports:
  - port: 3306
    targetPort: 3306
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: data-space
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  type: ClusterIP
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: data-space
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672

---

