apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: web-gateway
  namespace: app-space
  annotations:
    external-dns.alpha.kubernetes.io/hostname: "*.mubashir.site"
    argocd.argoproj.io/sync-wave: "1"
spec:
  selector:
    istio: ingress
  servers:
  - port:
      number: 80
      name: http
      protocol: HTTP
    hosts:
    - "*.mubashir.site"
  - port:
      number: 443
      name: https
      protocol: HTTPS
    tls:
      mode: SIMPLE
      credentialName: mubashir-tls
    hosts:
    - "*.mubashir.site"
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: mubashir-site-cert
  namespace: istio-system
  annotations:
     argocd.argoproj.io/sync-wave: "2"
spec:
  secretName: mubashir-tls
  issuerRef:
    name: letsencrypt-staging    
    kind: ClusterIssuer
  dnsNames:
    - mubashir.site
    - argocd.mubashir.site
    - grafana.mubashir.site
    - prometheus.mubashir.site
    - jaeger.mubashir.site
    - kiali.mubashir.site   
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: web
  namespace: app-space
  annotations:
     argocd.argoproj.io/sync-wave: "3"
spec:
  hosts:
  - mubashir.site
  gateways:
  - app-space/web-gateway
  http:
  - match:
    - uri:
        prefix: /api/catalogue
    route:
    - destination:
        host: catalogue
        port:
          number: 8080
  - match:
    - uri:
        prefix: /api/user
    route:
    - destination:
        host: user
        port:
          number: 8080
  - match:
    - uri:
        prefix: /api/cart
    route:
    - destination:
        host: cart
        port:
          number: 8080
  - match:
    - uri:
        prefix: /api/shipping
    rewrite:
      uri: /
    route:
    - destination:
        host: shipping
        port:
          number: 8080
  - match:
    - uri:
        prefix: /api/payment
    rewrite:
      uri: /
    route:
    - destination:
        host: payment
        port:
          number: 8080
  - match:
    - uri:
        prefix: /api/ratings
    route:
    - destination:
        host: ratings
        port:
          number: 80
  - match:
    - uri:
        prefix: /images
    route:
    - destination:
        host: web
        port:
          number: 3000
  - match:
    - uri:
        prefix: /
    route:
    - destination:
        host: web
        port:
          number: 3000
      weight: 50
    - destination:
        host: web-2
        port:
          number: 3000
      weight: 50

---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: jaeger
  namespace: jaeger
  annotations:
     argocd.argoproj.io/sync-wave: "3"
spec:
  hosts:
  - "jaeger.mubashir.site"
  gateways:
  - app-space/web-gateway
  http:
  - route:
    - destination:
        host: my-jaeger-query
        port:
          number: 16686

---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: argocd
  namespace: argo-cd
  annotations:
     argocd.argoproj.io/sync-wave: "3"
spec:
  hosts:
  - "argocd.mubashir.site"
  gateways:
  - app-space/web-gateway
  http:
  - route:
    - destination:
        host: argocd-server
        port:
          number: 80
---

apiVersion: networking.istio.io/v1beta1
