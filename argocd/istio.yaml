  name: grafana
  namespace: monitoring
  annotations:
     argocd.argoproj.io/sync-wave: "3"
spec:
  hosts:
  - "grafana.mubashir.site"
  gateways:
  - app-space/web-gateway
  http:
  - match:
    - uri:
        prefix: /
    route:
    - destination:
        host: grafana
        port:
          number: 80
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: prometheus
  namespace: monitoring
  annotations:
     argocd.argoproj.io/sync-wave: "3"
spec:
  hosts:
  - "prometheus.mubashir.site"
  gateways:
  - app-space/web-gateway
  http:
  - match:
    - uri:
        prefix: /
    route:
    - destination:
        host: prometheus-kube-prometheus-prometheus
        port:
          number: 9090
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: kiali
  namespace: istio-system
  annotations:
     argocd.argoproj.io/sync-wave: "3"
spec:
  hosts:
  - "kiali.mubashir.site"
  gateways:
  - app-space/web-gateway
  http:
  - route:
    - destination:
        host: kiali-server
        port:
          number: 20001
