apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: robotshop-app
  namespace: argo-cd
spec:
  project: default
  source:
    repoURL: https://github.com/MubashirHusain2005/gatus-eks/tree/master
    path: <path-of-your-source>
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

